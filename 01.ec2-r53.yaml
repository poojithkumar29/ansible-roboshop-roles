- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-03b9d89518421df5f
    zone_id: Z03050851O7EFPQ87AMM1
    domain_name: daws1.shop
    # instances:
    # - mongodb
    # - redis
    # - mysql
    # - rabbitmq
    # - user
    # - catalogue
    # - cart


  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        wait: yes
        tags:
          Name: "{{ item }}"
      loop: "{{ instances }}"
      register: ec2_output

    # - name: print the ec2_output
    #   ansible.builtin.debug: 
    #     msg: "{{ ec2_output }}"

    # - name: Get the public ip_address
    #   ansible.builtin.debug:
    #     msg: "{{ item.instances[0].public_ip_address }}"
    #   loop: "{{ ec2_output.results }}"
      
    # - name: Get the private_ip_address
    #   ansible.builtin.debug:
    #     msg: "{{ item.instances[0].private_ip_address }}"
    #   loop: "{{ ec2_output.results }}"
    
    - name: create route53
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}"
        value: "{{ item.instances[0].private_ip_address }}"
        type: A
        ttl: 1
        overwrite: true
      loop: "{{ ec2_output.results }}"
    
    - name: create route53 record for forntend
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}"
        value: "{{ item.instances[0].public_ip_address }}"
        type: A
        ttl: 1
        overwrite: true
      when: item.item == 'frontend'
      loop: "{{ ec2_output.results }}"

    - name: create root domain record
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"
        value: "{{ item.instances[0].public_ip_address }}"
        type: A
        ttl: 1
        overwrite: true
      when: item.item == 'frontend'
      loop: "{{ ec2_output.results }}"


