- name: import app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: import nodejs
  ansible.builtin.import_role:
    name: common
    tasks_from: nodejs.yaml

- name: copy mongodb repo
  ansible.builtin.copy:
    src: mongodb.repo
    dest: /etc/yum.repos.d/mongodb.repo 


- name: install mongodb client
  ansible.builtin.package:
    name: mongodb-mongosh
    state: present

- name: connnect to mongodb catalogue
  ansible.builtin.command: mongosh {{ MONGODB_dns }} --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
  register: catalogue_output



- name: load products into mongodb
  ansible.builtin.shell: mongosh --host {{ MONGODB_dns }} </app/db/master-data.js
  when: catalogue_output.stdout | int < 0

- name: system-setup
  ansible.builtin.import_role:
    name: common
    tasks_from:  system-setup.yaml





